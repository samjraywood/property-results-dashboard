<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/samjraywood/property-results-dashboard/main/house_image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #f2efe8;
      --panel: #ffffff;
      --panel-soft: #f8f7f2;
      --sidebar-bg: #f4f2eb;
      --border: #d7ddd0;
      --text: #2d322b;
      --text-muted: #5c6658;
      --primary: #627252;
      --primary-soft: #e5eadc;
      --secondary: #9ba994;
      --shadow-sm: 0 1px 2px rgba(32, 39, 32, 0.04), 0 4px 12px rgba(32, 39, 32, 0.04);
      --shadow-md: 0 8px 24px rgba(36, 42, 36, 0.08);
      --radius-md: 6px;
      --radius-lg: 8px;
      --space-1: 8px;
      --space-2: 16px;
      --space-3: 24px;
      --space-4: 32px;
      --space-5: 40px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #f5f2ea 0%, #f1eee6 42%, #ece9e0 100%);
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    .app-shell {
      min-height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .brand-name {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: clamp(2.25rem, 3.8vw, 3rem);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #2f3b2d;
      font-weight: 700;
    }

    .brand-banner {
      background: linear-gradient(135deg, #d9e1cd 0%, #c9d2bc 100%);
      border: 1px solid #b7c3a7;
      border-radius: 0;
      padding: var(--space-2) var(--space-3);
      margin-bottom: 0;
      box-shadow: 0 2px 8px rgba(65, 78, 58, 0.08);
      position: relative;
    }

    .app-main {
      margin-left: 0;
      padding: 0 0 var(--space-4);
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .topbar-note {
      color: #4b5a45;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      max-width: 460px;
      text-align: right;
      margin-left: auto;
    }

    .main-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: var(--space-3) var(--space-3) 0;
    }

    .page-header {
      margin-bottom: var(--space-2);
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.15rem, 1.4vw, 1.35rem);
      line-height: 1.2;
      font-weight: 700;
      color: #2a3028;
      letter-spacing: -0.01em;
    }

    .page-subtitle {
      margin-top: var(--space-1);
      margin-bottom: 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Controls are grouped in a single surface to keep hierarchy clear and scannable. */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-1);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 10px;
      margin-bottom: var(--space-2);
    }

    .field {
      height: 40px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      padding: 0 10px;
      font-size: 14px;
      min-width: 170px;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .field:focus-visible {
      outline: none;
      border-color: #b9c8a8;
      box-shadow: 0 0 0 3px rgba(169, 186, 156, 0.2);
    }

    .view-switch {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      border-radius: 6px;
      padding: 4px;
    }

    .view-switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .view-pill {
      padding: 8px 12px;
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 180ms ease;
    }

    .view-switch input:checked + .view-pill {
      color: #293126;
      background: #e3e9d8;
    }

    .status {
      margin: 0 0 var(--space-2);
      font-size: 13px;
      color: var(--text-muted);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: var(--space-2);
      align-items: start;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-2);
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .map-column {
      position: sticky;
      top: var(--space-2);
    }

    .map-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      background: var(--panel);
    }

    #map {
      width: 100%;
      height: 620px;
    }

    .property-card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      overflow: visible;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease, background-color 220ms ease;
    }

    .property-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(36, 42, 36, 0.1);
      border-color: #cbd3c0;
    }

    /* Selected cards use a soft green tint instead of hard outlines to match the app aesthetic. */
    .selected-tile {
      background: linear-gradient(180deg, #f8faf4 0%, var(--primary-soft) 100%);
      border-color: #afbc9f;
      box-shadow: 0 0 0 2px rgba(155, 169, 148, 0.28), 0 8px 20px rgba(36, 42, 36, 0.08);
    }

    .card-image-wrap {
      position: relative;
      height: 206px;
      overflow: hidden;
      border-bottom: 1px solid #ebefe3;
      border-top-left-radius: var(--radius-lg);
      border-top-right-radius: var(--radius-lg);
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge-stack {
      position: absolute;
      top: var(--space-1);
      left: var(--space-1);
      right: var(--space-1);
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.85);
      color: #3f493d;
    }

    .badge.new {
      background: #e3ead7;
      color: #3e5535;
      border-color: #cedbbe;
    }

    .badge.top {
      background: #f0ead6;
      color: #715d38;
      border-color: #e4d8b6;
      margin-left: auto;
    }

    .metric-bubble {
      position: absolute;
      bottom: var(--space-1);
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow-sm);
      border: 1px solid #d4dcc9;
    }

    .metric-left {
      left: var(--space-1);
    }

    .metric-right {
      right: var(--space-1);
    }

    .metric-caption {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -8px;
      padding: 2px 7px;
      background: #fefefe;
      border: 1px solid #d3dbc8;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 500;
      color: #566053;
      white-space: nowrap;
    }

    .card-content {
      padding: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 4px;
    }

    .property-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #293126;
      line-height: 1.25;
      letter-spacing: -0.01em;
      width: 100%;
    }

    .property-price {
      margin: 0;
      font-size: 21px;
      font-weight: 700;
      color: #263023;
      line-height: 1.1;
      white-space: normal;
    }

    .price-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .property-sub {
      margin: 0;
      color: #5d665a;
      font-size: 13px;
    }

    .property-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-1);
    }

    .metric-chip {
      border: 1px solid #dde4d4;
      border-radius: 6px;
      background: #f9fbf6;
      padding: 8px;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chip-label {
      font-size: 11px;
      color: #76806e;
      font-weight: 500;
      white-space: nowrap;
    }

    .chip-value {
      font-size: 13px;
      font-weight: 600;
      color: #354035;
      text-align: right;
    }

    .meta-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-1);
      padding-top: var(--space-1);
      border-top: 1px solid #e4eadb;
    }

    .meta-item {
      font-size: 12px;
      color: #475145;
      min-width: 0;
      max-width: 48%;
    }

    .meta-sub {
      margin-top: 4px;
      font-size: 11px;
      color: #64705f;
    }

    .meta-k {
      color: #6c7567;
      margin-right: 4px;
    }

    .score-wrap {
      position: relative;
    }

    .detail-controls {
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      min-width: 182px;
    }

    .detail-controls .score-button {
      width: 100%;
      justify-content: space-between;
    }

    .score-button {
      border: 1px solid #ced8c1;
      background: #f3f7ec;
      padding: 6px 10px;
      color: #354535;
      font-size: 11px;
      font-weight: 600;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background-color 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .score-button:hover {
      background: #e9f0df;
      border-color: #bcc9ad;
      transform: translateY(-1px);
    }

    .score-button::after {
      content: "▾";
      font-size: 11px;
      line-height: 1;
      color: #5b6a54;
      transition: transform 150ms ease;
    }

    .score-wrap.open .score-button::after {
      transform: rotate(180deg);
    }

    .score-button-value {
      font-size: 12px;
      font-weight: 700;
      color: #2e402e;
    }

    .score-tooltip {
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      top: auto;
      width: 320px;
      max-width: min(320px, 86vw);
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px) scale(0.98);
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 40;
    }

    .score-wrap.open .score-tooltip {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .score-tooltip-inner {
      max-height: 180px;
      overflow-y: auto;
      border-radius: 10px;
      border: 1px solid #ced8c1;
      background: linear-gradient(180deg, #fcfdf9 0%, #f4f8ee 100%);
      box-shadow: 0 14px 30px rgba(42, 53, 39, 0.18);
      padding: 12px;
      font-size: 12px;
      display: grid;
      gap: 8px;
    }

    .feature-list {
      display: grid;
      gap: 4px;
    }

    .feature-row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr);
      align-items: start;
      gap: 6px;
      color: #4f5a4c;
      font-size: 12px;
    }

    .feature-text {
      white-space: normal;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    .feature-dot {
      color: #708169;
      font-weight: 700;
      line-height: 1.2;
    }

    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 0;
      color: #556052;
    }

    .breakdown-main {
      min-width: 0;
      flex: 1;
      display: grid;
      gap: 4px;
    }

    .breakdown-feature {
      color: #495446;
      font-size: 12px;
      line-height: 1.25;
    }

    .breakdown-track {
      height: 6px;
      background: #e4ebd9;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #d6e0ca;
    }

    .breakdown-fill {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    .breakdown-fill.positive {
      background: linear-gradient(90deg, #86b46b 0%, #5f8f4d 100%);
    }

    .breakdown-fill.negative {
      background: linear-gradient(90deg, #d28f7f 0%, #b96e5f 100%);
    }

    .breakdown-points {
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 3px 7px;
      background: #edf3e4;
      border: 1px solid #d3dec5;
      color: #3e4f3a;
    }

    .breakdown-row.positive {
      color: #3f6440;
    }

    .breakdown-row.negative {
      color: #7b4a44;
    }

    .view-button {
      width: 100%;
      border: 1px solid #b8c5a8;
      border-radius: 6px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #687b53 0%, #60724e 100%);
      color: #f6f8f2;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .view-button:focus-visible,
    .score-button:focus-visible,
    .field:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(155, 169, 148, 0.28);
    }

    .view-button:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .list-layout {
      position: relative;
      display: grid;
      grid-template-columns: 176px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      align-items: stretch;
    }

    .list-media {
      height: 100%;
    }

    .list-image {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      object-fit: cover;
      display: block;
    }

    .list-metrics {
      margin-top: var(--space-1);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .metric-inline {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .metric-inline-label {
      font-size: 9px;
      color: #667063;
      border-radius: 999px;
      border: 1px solid #dbe2d0;
      background: #ffffff;
      padding: 2px 7px;
    }

    .list-main h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: #293126;
    }

    .list-main .list-price {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      color: #263023;
      font-weight: 700;
    }

    .list-main .price-row {
      margin-top: 2px;
      margin-bottom: 2px;
    }

    .list-main p {
      margin: 2px 0 8px;
      color: #6c7468;
      font-size: 13px;
    }

    .list-details {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-1);
      font-size: 12px;
      color: #4f584d;
      margin-bottom: 8px;
    }

    .list-detail-item {
      border: 1px solid #e0e6d8;
      border-radius: 6px;
      background: #f9fbf6;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .list-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-1);
      padding-top: 6px;
      border-top: 1px solid #e4eadb;
    }

    .list-meta-main {
      min-width: 0;
      font-size: 12px;
      color: #475145;
    }

    .list-meta-sub {
      margin-top: 3px;
      font-size: 11px;
      color: #64705f;
    }

    .list-label {
      font-size: 10px;
      color: #7a8373;
      font-weight: 500;
      white-space: nowrap;
    }

    .list-value {
      color: #435040;
      font-size: 12px;
      font-weight: 600;
      text-align: right;
    }

    .list-detail-controls {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      align-self: center;
      justify-content: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: nowrap;
    }

    .list-detail-controls .score-wrap {
      min-width: 0;
    }

    .list-detail-controls .score-button,
    .list-detail-controls .view-button {
      width: auto;
      min-width: 0;
      justify-content: center;
      text-align: center;
    }

    .list-badges {
      top: var(--space-1);
      left: auto;
      right: var(--space-1);
      justify-content: flex-end;
      gap: 6px;
    }

    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .map-inline-message {
      background: #efe9d7;
      border: 1px solid #ddd2ad;
      color: #63573c;
      padding: 8px 10px;
      border-radius: 6px;
      box-shadow: var(--shadow-sm);
      font-size: 12px;
      font-weight: 500;
    }

    .empty-text {
      color: #778071;
      font-size: 12px;
    }

    @media (max-width: 1280px) {
      .content-grid {
        grid-template-columns: minmax(0, 1fr) 300px;
      }
    }

    @media (max-width: 1120px) {
      .content-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .map-column {
        position: static;
      }

      #map {
        height: 340px;
      }

      .results-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .brand-banner {
        padding: var(--space-2);
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .topbar-note {
        text-align: left;
        max-width: none;
        margin-left: 0;
        font-size: 13px;
      }

      .main-inner {
        padding: var(--space-2) var(--space-2) 0;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .list-layout {
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
      }
    }

    @media (max-width: 640px) {
      .brand-banner {
        padding: var(--space-1) var(--space-2);
      }

      .brand-name {
        font-size: 1.9rem;
      }

      .topbar-note {
        font-size: 12px;
      }

      .main-inner {
        padding: var(--space-2) var(--space-1) 0;
      }

      .list-layout {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .list-media {
        height: 180px;
      }

      .list-image {
        height: 100%;
        border-radius: 6px 6px 0 0;
      }

      .list-details {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .list-detail-controls {
        width: 100%;
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      .list-meta-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .detail-controls {
        min-width: 0;
        width: 100%;
      }

      .score-button {
        font-size: 11px;
      }

      .card-header {
        align-items: flex-start;
      }

      .property-price {
        white-space: normal;
      }

      .toolbar {
        gap: 6px;
      }

      .field {
        min-width: 0;
        flex: 1;
      }

      .view-switch {
        margin-left: 0;
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 400px) {
      .results-grid {
        grid-template-columns: 1fr;
      }

      .property-meta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    /* Expired property styling */
    .badge.expired {
      background: #f5e8e8;
      color: #8b3a3a;
      border-color: #e0c0c0;
    }

    .property-card.expired-card {
      opacity: 0.68;
      background: #f9f8f6;
    }

    .property-card.expired-card:hover {
      opacity: 0.85;
    }

    /* Price change indicator */
    .price-change {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      margin-left: auto;
      white-space: nowrap;
    }

    .price-change.down {
      color: #275e30;
      background: #e3f2e5;
      border-color: #b8d9bc;
    }

    .price-change.up {
      color: #8b2e2e;
      background: #f5e6e6;
      border-color: #e0bebf;
    }

    .price-change.flat {
      color: #595d55;
      background: #eeeeec;
      border-color: #d5d5d2;
    }

    .price-was {
      font-size: 13px;
      color: #8a9186;
      font-weight: 400;
    }

    .expired-date {
      font-size: 11px;
      color: #8b6060;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <main class="app-main">
    <div class="brand-banner">
      <div class="topbar">
        <div class="brand">
          <span class="brand-name">Foray</span>
        </div>
        <div class="topbar-note">
          Your first foray into better property decisions
        </div>
      </div>
    </div>
    <div class="main-inner">
      <header class="page-header">
        <h1 class="page-title">Property Dashboard</h1>
        <p class="page-subtitle">Explore scored listings, compare metrics, and focus top picks quickly.</p>
      </header>

      <div class="toolbar">
        <select id="sortBy" onchange="applyFilters()" class="field">
          <option value="score_desc" selected>Score (desc)</option>
          <option value="score_asc">Score (asc)</option>
          <option value="price_desc">Price (desc)</option>
          <option value="price_asc">Price (asc)</option>
          <option value="first_seen_desc">First Seen (desc)</option>
          <option value="first_seen_asc">First Seen (asc)</option>
        </select>

        <select id="locationFilter" onchange="applyFilters()" class="field">
          <option value="">All Sources</option>
        </select>

        <select id="statusFilter" onchange="applyFilters()" class="field">
          <option value="all">All Statuses</option>
          <option value="active">Active</option>
          <option value="expired">Expired</option>
        </select>

        <select id="priceMovement" onchange="applyFilters()" class="field">
          <option value="">Any Price Movement</option>
          <option value="down">Price Down ↓</option>
          <option value="up">Price Up ↑</option>
          <option value="flat">No Change</option>
          <option value="none">No History</option>
        </select>

        <div class="view-switch" role="radiogroup" aria-label="View mode">
          <label>
            <input type="radio" name="view" value="list" onchange="toggleView('list')">
            <span class="view-pill">List</span>
          </label>
          <label>
            <input type="radio" name="view" value="grid" checked onchange="toggleView('grid')">
            <span class="view-pill">Tiles</span>
          </label>
        </div>
      </div>

      <p id="status" class="status"></p>

      <section class="content-grid">
        <div>
          <div id="results" class="results-grid"></div>
        </div>

        <aside class="map-column">
          <div class="map-card">
            <div id="map"></div>
          </div>
        </aside>
      </section>
    </div>
  </main>
</div>

<script>
let properties = [];
let filtered = [];
let map;
let markers = [];
let selectedId = null;
let viewMode = 'grid';
let mapMessageControl = null;
let topPickSet = new Set();

const DATA_URL = "https://raw.githubusercontent.com/samjraywood/property-result-data/main/property-results.json";

// DEMO MODE BLOCK START (remove this block later if no longer needed)
const DEMO_MODE = new URLSearchParams(window.location.search).get("demo") === "1";

function buildDemoFixtures(list){
  if (!DEMO_MODE) return list;

  const base = Array.isArray(list) ? list : [];
  const first = base[0] || {};
  const second = base[1] || first;
  const now = Date.now();
  const isoNow = new Date(now).toISOString();
  const iso7dAgo = new Date(now - (7 * 24 * 60 * 60 * 1000)).toISOString();
  const iso21dAgo = new Date(now - (21 * 24 * 60 * 60 * 1000)).toISOString();

  const expiredDemo = {
    ...first,
    link: `${first.link || "demo-listing"}#demo-expired`,
    location: `${first.location || "Sample Listing"} (Demo Expired)`,
    source_location: first.source_location || "Demo Source",
    status: "expired",
    expired_at: isoNow,
    first_seen: first.first_seen || iso21dAgo,
    last_seen: iso7dAgo,
    price: 490000,
    price_history: [
      { date: iso21dAgo, price: 500000 },
      { date: iso7dAgo, price: 490000 }
    ],
    price_change: {
      previous_price: 500000,
      value: -10000,
      direction: "down"
    }
  };

  const increasedDemo = {
    ...second,
    link: `${second.link || "demo-listing"}#demo-up`,
    location: `${second.location || "Sample Listing"} (Demo Price Up)`,
    source_location: second.source_location || "Demo Source",
    status: "active",
    expired_at: null,
    first_seen: second.first_seen || iso21dAgo,
    last_seen: isoNow,
    price: 515000,
    price_history: [
      { date: iso21dAgo, price: 505000 },
      { date: isoNow, price: 515000 }
    ],
    price_change: {
      previous_price: 505000,
      value: 10000,
      direction: "up"
    }
  };

  return [expiredDemo, increasedDemo, ...base];
}
// DEMO MODE BLOCK END

function formatPrice(v){ return v ? "£"+Number(v).toLocaleString() : "?" }

function formatDateTime(v){
  if(!v) return "-";
  const d = new Date(v);
  return d.toLocaleString(undefined, {
    year:'numeric',
    month:'short',
    day:'numeric',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function isNew(v){
  if(!v) return false;
  return (new Date() - new Date(v)) <= (12*60*60*1000);
}

function getPriceChangeDisplay(p){
  const pc = p.price_change || {};
  if (pc.direction == null) {
    return derivePriceChangeFromHistory(p.price_history);
  }
  return {
    direction: pc.direction,
    previousPrice: pc.previous_price,
    changeValue: pc.value,
    label: formatPriceChangeLabel(pc.direction, pc.value),
  };
}

function derivePriceChangeFromHistory(history){
  if (!history || history.length < 2) return null;
  const current = history[history.length - 1].price;
  const previous = history[history.length - 2].price;
  const value = current - previous;
  const direction = value > 0 ? "up" : value < 0 ? "down" : "flat";
  return {
    direction,
    previousPrice: previous,
    changeValue: value,
    label: formatPriceChangeLabel(direction, value),
  };
}

function formatPriceChangeLabel(direction, value){
  if (direction === "down") return `↓ −${formatPrice(Math.abs(value))}`;
  if (direction === "up") return `↑ +${formatPrice(value)}`;
  if (direction === "flat") return "No change";
  return "";
}

function getStatusDisplay(p){
  if (p.status === "expired") {
    let dateStr = null;
    if (p.expired_at) {
      dateStr = new Date(p.expired_at).toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric",
      });
    }
    return { isExpired: true, label: "Expired", date: dateStr };
  }
  return { isExpired: false, label: "Active", date: null };
}

function renderPriceChangeHTML(pcd){
  if (!pcd || !pcd.label || pcd.direction === "flat" || pcd.direction == null) return "";
  const dir = pcd.direction || "";
  const ariaMap = { down: "Price reduced", up: "Price increased" };
  const ariaLabel = ariaMap[dir] || "Price change";
  return `<span class="price-change ${dir}" role="img" aria-label="${ariaLabel}">${pcd.label}</span>`;
}

function computeTopPickSet(list, count = 3){
  const ranked = [...(Array.isArray(list) ? list : [])]
    .sort((a, b) => getScorePercent(b) - getScorePercent(a))
    .slice(0, Math.max(0, count));

  topPickSet = new Set(ranked);
}

function isTopPick(property){
  return topPickSet.has(property);
}

function getScorePercent(p){
  const val = Number(p?.score_percent);
  if (Number.isFinite(val)) return Math.max(0, Math.min(100, Math.round(val)));

  return 0;
}

function normalizeBreakdownEntry(entry){
  if (Array.isArray(entry)) {
    return {
      feature: String(entry[0] ?? "").trim(),
      score: Number(entry[1] ?? 0)
    };
  }

  if (entry && typeof entry === "object") {
    const feature = String(
      entry.feature ?? entry.name ?? entry.label ?? entry.signal ?? ""
    ).trim();
    const score = Number(entry.score ?? entry.value ?? entry.points ?? 0);
    return { feature, score };
  }

  if (typeof entry === "string") {
    const text = entry.trim();
    const m = text.match(/([+-]?\d+(?:\.\d+)?)\s*$/);
    const score = m ? Number(m[1]) : 0;
    const feature = m ? text.slice(0, m.index).replace(/[:\-–]\s*$/, "").trim() : text;
    return { feature, score };
  }

  return { feature: "", score: 0 };
}

function renderScoreBreakdown(breakdown){
  const entries = (Array.isArray(breakdown) ? breakdown : [])
    .map(normalizeBreakdownEntry)
    .filter(item => item.feature);

  if (!entries.length) {
    return '<div class="empty-text">-</div>';
  }

  const maxAbs = Math.max(1, ...entries.map(item => Math.abs(Number(item.score) || 0)));

  return entries.map(item => {
    const positive = item.score >= 0;
    const colorClass = positive ? "positive" : "negative";
    const value = `${positive ? "+" : ""}${item.score}`;
    const strength = Math.max(8, Math.round((Math.abs(Number(item.score) || 0) / maxAbs) * 100));

    return `
      <div class="breakdown-row ${colorClass}">
        <div class="breakdown-main">
          <span class="breakdown-feature truncate">${item.feature}</span>
          <div class="breakdown-track"><span class="breakdown-fill ${colorClass}" style="width:${strength}%"></span></div>
        </div>
        <span class="breakdown-points">${value}</span>
      </div>
    `;
  }).join("");
}

function normalizeKeyFeature(feature){
  if (typeof feature === "string") return feature.trim();
  if (feature && typeof feature === "object") {
    return String(feature.feature ?? feature.name ?? feature.label ?? feature.value ?? "").trim();
  }
  return "";
}

function renderKeyFeatures(features){
  const items = (Array.isArray(features) ? features : [])
    .map(normalizeKeyFeature)
    .filter(Boolean);

  if (!items.length) {
    return '<div class="empty-text">-</div>';
  }

  return `<div class="feature-list">${items
    .map(item => `<div class="feature-row"><span class="feature-dot">•</span><span class="feature-text">${item}</span></div>`)
    .join("")}</div>`;
}

function setStatus(){
  const demoHint = DEMO_MODE ? " (Demo mode: on)" : "";
  document.getElementById("status").textContent = `Showing ${filtered.length} of ${properties.length} properties${demoHint}`;
}

function initMap(){
  map=L.map('map').setView([51.5,-0.1],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
}

function showMapMessage(msg){
  clearMapMessage();

  mapMessageControl = L.control({ position: 'topright' });

  mapMessageControl.onAdd = function () {
    const div = L.DomUtil.create('div');
    div.className = "map-inline-message";
    div.innerHTML = msg;
    return div;
  };

  mapMessageControl.addTo(map);
}

function clearMapMessage(){
  if (mapMessageControl){
    map.removeControl(mapMessageControl);
    mapMessageControl = null;
  }
}

function updateMap(){
  clearMapMessage();

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const bounds=[];

  filtered.forEach(p=>{
    const lat = Number(p.latitude);
    const lng = Number(p.longitude);
    if(!lat || !lng) return;

    const m = L.marker([lat, lng]).addTo(map);

    if (p.link === selectedId) {
      m.setIcon(L.icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
        iconSize: [32, 32]
      }));
    }

    m.on("click", () => {
      selectedId = p.link;
      render();

      setTimeout(() => {
        const el = document.querySelector(`[data-id="${p.link}"]`);
        if (el) {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }, 50);

      map.setView([lat, lng], 15);
    });

    markers.push(m);
    bounds.push([lat,lng]);
  });

  if(bounds.length && !selectedId){
    map.fitBounds(bounds,{padding:[40,40]});
  }
}

function focusProperty(p){
  const lat = Number(p.latitude);
  const lng = Number(p.longitude);
  if(lat && lng) map.setView([lat,lng],15);
}

async function loadData(){
  const res = await fetch(DATA_URL);
  const data = await res.json();

  properties = buildDemoFixtures(Object.values(data || {}));
  filtered = [...properties];
  computeTopPickSet(properties, 3);

  populateLocations();
  applyFilters();
}

function populateLocations(){
  const s=document.getElementById("locationFilter");
  s.innerHTML='<option value="">All Sources</option>';

  [...new Set(properties.map(p=>p.source_location).filter(Boolean))]
    .forEach(l=>{
      const o=document.createElement("option");
      o.value=l;o.textContent=l;s.appendChild(o);
    });
}

function toggleView(mode){
  viewMode = mode;
  render();
}

function closeScoreBreakdowns(exceptWrap = null){
  document.querySelectorAll('.score-wrap.open').forEach(wrap => {
    if (exceptWrap && wrap === exceptWrap) return;
    wrap.classList.remove('open');
    const btn = wrap.querySelector('.score-button');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  });
}

function toggleScoreBreakdown(event, button){
  event.stopPropagation();
  const wrap = button.closest('.score-wrap');
  if (!wrap) return;

  const shouldOpen = !wrap.classList.contains('open');
  closeScoreBreakdowns(wrap);
  wrap.classList.toggle('open', shouldOpen);
  button.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
}

function render(){
  const c=document.getElementById("results");

  c.className = viewMode === 'grid'
    ? "results-grid"
    : "results-list";

  c.innerHTML="";

  filtered.forEach(p=>{
    const d=document.createElement("div");
    d.dataset.id = p.link;
    d.className = "property-card";

    if(selectedId===p.link) d.classList.add("selected-tile");

    d.onclick = () => {
      const lat = Number(p.latitude);
      const lng = Number(p.longitude);

      if (selectedId === p.link) {
        selectedId = null;
        updateMap();
        render();
        return;
      }

      selectedId = p.link;
      render();

      if (lat && lng) {
        clearMapMessage();
        focusProperty(p);
      } else {
        showMapMessage("No map location available for this property");
      }
    };

    const thumb = p.thumbnail || "https://via.placeholder.com/300x200";
    const scorePercent = getScorePercent(p);
    const completionPercent = Math.max(0, Math.min(100, Math.round(Number(p.extraction_completeness) || 0)));
    const scoreBreakdownHTML = renderScoreBreakdown(p.score_breakdown);
    const keyFeaturesHTML = renderKeyFeatures(p.key_features);
    const keyFeaturesCount = Array.isArray(p.key_features)
      ? p.key_features.map(normalizeKeyFeature).filter(Boolean).length
      : 0;
    const statusDisplay = getStatusDisplay(p);
    const priceChange = getPriceChangeDisplay(p);
    const priceChangeHTML = renderPriceChangeHTML(priceChange);
    const wasHTML = (priceChange && priceChange.previousPrice != null && (priceChange.direction === "up" || priceChange.direction === "down"))
      ? `(was ${formatPrice(priceChange.previousPrice)})`
      : "";

    if(statusDisplay.isExpired) d.classList.add("expired-card");

    if(viewMode === 'grid'){
      d.innerHTML = `
        <div class="card-image-wrap">
          <div class="badge-stack">
            ${statusDisplay.isExpired ? '<div class="badge expired" role="status" aria-label="This listing has expired">Expired</div>' : (isNew(p.first_seen) ? '<div class="badge new">New</div>' : '<span></span>')}
            ${isTopPick(p) ? '<div class="badge top">Top Pick</div>' : ''}
          </div>

          <img src="${thumb}" class="card-image"
            onerror="this.src='https://via.placeholder.com/300x200'" />
        </div>

        <div class="card-content">
          <div class="card-header">
            <h3 class="property-title truncate">${p.location||'Unknown Property'}</h3>
            <div class="price-row">
              <p class="property-price">${formatPrice(p.price)}${wasHTML ? ` <span class="price-was" aria-label="Previous price">${wasHTML}</span>` : ''}</p>
              ${priceChangeHTML}
            </div>
            <p class="property-sub">${p.source_location||'-'}${statusDisplay.isExpired && statusDisplay.date ? ` · <span class="expired-date">Expired ${statusDisplay.date}</span>` : ''}</p>
          </div>

          <div class="property-meta">
            <div class="metric-chip"><span class="chip-label">Beds</span><span class="chip-value">${p.beds||'-'}</span></div>
            <div class="metric-chip"><span class="chip-label">Baths</span><span class="chip-value">${p.baths||'-'}</span></div>
            <div class="metric-chip"><span class="chip-label">Size</span><span class="chip-value">${p.property_size||'-'}</span></div>
            <div class="metric-chip"><span class="chip-label">Garden</span><span class="chip-value">${p.garden_size || p.garden || '-'}</span></div>
          </div>

          <div class="meta-row">
            <div class="meta-item truncate">
              <span class="meta-k">First Seen:</span>${formatDateTime(p.first_seen)}
              <div class="meta-sub"><span class="meta-k">Last Seen:</span>${formatDateTime(p.last_seen)}</div>
              <div class="meta-sub">Extraction Completion: ${completionPercent}%</div>
            </div>
            <div class="detail-controls" onclick="event.stopPropagation();">
              <div class="score-wrap">
                <button type="button" class="score-button" onclick="toggleScoreBreakdown(event, this)" aria-expanded="false">
                  <span>Key Features</span>
                  <span class="score-button-value">${keyFeaturesCount}</span>
                </button>
                <div class="score-tooltip">
                  <div class="score-tooltip-inner">
                    ${keyFeaturesHTML}
                  </div>
                </div>
              </div>
              <div class="score-wrap">
                <button type="button" class="score-button" onclick="toggleScoreBreakdown(event, this)" aria-expanded="false">
                  <span>Score Breakdown</span>
                  <span class="score-button-value">${scorePercent}%</span>
                </button>
                <div class="score-tooltip">
                  <div class="score-tooltip-inner">
                    ${scoreBreakdownHTML}
                  </div>
                </div>
              </div>
            </div>
          </div>

          <button onclick="window.open('${p.link}','_blank');event.stopPropagation();"
            class="view-button">
            View Listing
          </button>
        </div>
      `;
    } else {
      d.innerHTML = `
        <div class="badge-stack list-badges">
          ${isTopPick(p) ? '<div class="badge top">Top Pick</div>' : ''}
          ${isNew(p.first_seen) ? '<div class="badge new">New</div>' : ''}
          ${statusDisplay.isExpired ? '<div class="badge expired" role="status" aria-label="This listing has expired">Expired</div>' : ''}
        </div>

        <div class="list-layout">

          <div class="list-media">
            <img src="${thumb}" class="list-image"
              onerror="this.src='https://via.placeholder.com/150'" />
          </div>

          <div class="list-main">
            <h3 class="truncate">${p.location||'Unknown Property'}</h3>
            <div class="price-row">
              <p class="list-price">${formatPrice(p.price)}${wasHTML ? ` <span class="price-was" aria-label="Previous price">${wasHTML}</span>` : ''}</p>
              ${priceChangeHTML}
            </div>
            <p class="truncate">${p.source_location||'-'}${statusDisplay.isExpired && statusDisplay.date ? ` · <span class="expired-date">Expired ${statusDisplay.date}</span>` : ''}</p>

            <div class="list-details">
              <div class="list-detail-item"><span class="list-label">Beds</span><span class="list-value">${p.beds||'-'}</span></div>
              <div class="list-detail-item"><span class="list-label">Baths</span><span class="list-value">${p.baths||'-'}</span></div>
              <div class="list-detail-item"><span class="list-label">Size</span><span class="list-value">${p.property_size||'-'}</span></div>
              <div class="list-detail-item"><span class="list-label">Garden</span><span class="list-value">${p.garden_size || p.garden || '-'}</span></div>
            </div>

            <div class="list-meta-row">
              <div class="list-meta-main truncate">
                <span class="meta-k">First Seen:</span>${formatDateTime(p.first_seen)}
                <div class="list-meta-sub"><span class="meta-k">Last Seen:</span>${formatDateTime(p.last_seen)}</div>
                <div class="list-meta-sub">Extraction Completion: ${completionPercent}%</div>
              </div>
              <div class="detail-controls list-detail-controls" onclick="event.stopPropagation();">
                <div class="score-wrap">
                  <button type="button" class="score-button" onclick="toggleScoreBreakdown(event, this)" aria-expanded="false">
                    <span>Key Features</span>
                    <span class="score-button-value">${keyFeaturesCount}</span>
                  </button>
                  <div class="score-tooltip">
                    <div class="score-tooltip-inner">
                      ${keyFeaturesHTML}
                    </div>
                  </div>
                </div>
                <div class="score-wrap">
                  <button type="button" class="score-button" onclick="toggleScoreBreakdown(event, this)" aria-expanded="false">
                    <span>Score Breakdown</span>
                    <span class="score-button-value">${scorePercent}%</span>
                  </button>
                  <div class="score-tooltip">
                    <div class="score-tooltip-inner">
                      ${scoreBreakdownHTML}
                    </div>
                  </div>
                </div>
                <button onclick="window.open('${p.link}','_blank');event.stopPropagation();"
                  class="view-button">
                  View Listing
                </button>
              </div>
            </div>
          </div>

        </div>
      `;
    }

    c.appendChild(d);
  });

  updateMap();
}

function completenessCircle(v){
  return metricCircle(v, "Completion", "right");
}

function metricCircle(v, label, side){
  const val = Math.max(0, Math.min(100, Math.round(Number(v) || 0)));

  let color = "#ef4444"; // red
  if(val >= 80) color = "#22c55e"; // green
  else if(val >= 50) color = "#f59e0b"; // yellow

  const radius = 16;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (val / 100) * circumference;
  const sideClass = side === "left" ? "metric-left" : "metric-right";

  return `
    <div class="metric-bubble ${sideClass}">
      <div class="relative"
           title="${label}">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <!-- background circle -->
        <circle
          cx="20" cy="20" r="${radius}"
          stroke="#e5e7eb"
          stroke-width="4"
          fill="none"
        />

        <!-- progress -->
        <circle
          cx="20" cy="20" r="${radius}"
          stroke="${color}"
          stroke-width="4"
          fill="none"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${offset}"
          stroke-linecap="round"
          transform="rotate(-90 20 20)"
        />

        <!-- text -->
        <text
          x="50%" y="50%"
          dominant-baseline="middle"
          text-anchor="middle"
          font-size="10"
          font-weight="700"
          fill="#343c33"
        >
          ${val}%
        </text>
      </svg>

      <div class="metric-caption">
        ${label}
      </div>
      </div>
    </div>
  `;
}

function metricCircleInline(v, label){
  const val = Math.max(0, Math.min(100, Math.round(Number(v) || 0)));

  let color = "#ef4444"; // red
  if(val >= 80) color = "#22c55e"; // green
  else if(val >= 50) color = "#f59e0b"; // yellow

  const radius = 14;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (val / 100) * circumference;

  return `
    <div class="metric-inline">
      <div class="metric-bubble" style="position: static;" title="${label}">
        <svg width="36" height="36" viewBox="0 0 40 40">
          <circle
            cx="20" cy="20" r="${radius}"
            stroke="#e5e7eb"
            stroke-width="4"
            fill="none"
          />

          <circle
            cx="20" cy="20" r="${radius}"
            stroke="${color}"
            stroke-width="4"
            fill="none"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"
            stroke-linecap="round"
            transform="rotate(-90 20 20)"
          />

          <text
            x="50%" y="50%"
            dominant-baseline="middle"
            text-anchor="middle"
            font-size="9"
            font-weight="700"
            fill="#343c33"
          >
            ${val}%
          </text>
        </svg>
      </div>

      <div class="metric-inline-label">
        ${label}
      </div>
    </div>
  `;
}

function applyFilters(){
  const sort=document.getElementById("sortBy").value;
  const loc=document.getElementById("locationFilter").value;
  const status=document.getElementById("statusFilter").value;
  const movement=document.getElementById("priceMovement").value;

  filtered = properties.filter(p=>{
    if (loc && p.source_location !== loc) return false;
    const pStatus = p.status || "active";
    if (status !== "all" && pStatus !== status) return false;
    if (movement) {
      const pcd = getPriceChangeDisplay(p);
      const dir = pcd ? pcd.direction : null;
      if (movement === "none") {
        if (dir != null) return false;
      } else {
        if (dir !== movement) return false;
      }
    }
    return true;
  });

  filtered.sort((a,b)=>{
    switch(sort){
      case 'score_desc': return getScorePercent(b)-getScorePercent(a);
      case 'score_asc': return getScorePercent(a)-getScorePercent(b);
      case 'price_desc': return (b.price||0)-(a.price||0);
      case 'price_asc': return (a.price||0)-(b.price||0);
      case 'first_seen_desc': return new Date(b.first_seen)-new Date(a.first_seen);
      case 'first_seen_asc': return new Date(a.first_seen)-new Date(b.first_seen);
      default: return 0;
    }
  });

  selectedId=null;

  render();
  updateMap();
  setStatus();
}

initMap();
loadData();

document.addEventListener('click', () => closeScoreBreakdowns());
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') closeScoreBreakdowns();
});
</script>
