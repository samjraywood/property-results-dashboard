<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    .selected-tile { outline: 3px solid #3b82f6; }

    .ribbon {
      position: absolute;
      top: 10px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      color: white;
      z-index: 10;
      transform: rotate(-15deg);
      border-radius: 4px;
    }

    .ribbon-left {
      left: -10px;
      background: #16a34a;
    }

    .ribbon-right {
      right: -10px;
      background: #ca8a04;
      transform: rotate(15deg);
    }
  </style>
</head>
<body class="bg-gray-100 p-4">

<div class="max-w-7xl mx-auto">
  <h1 class="text-2xl font-bold mb-4">🏡 Property Dashboard</h1>

  <div class="bg-white p-3 rounded-xl shadow mb-4 flex flex-wrap gap-2 items-center">

    <select id="sortBy" onchange="applyFilters()" class="border p-2 rounded">
      <option value="score_desc" selected>Score (desc)</option>
      <option value="score_asc">Score (asc)</option>
      <option value="price_desc">Price (desc)</option>
      <option value="price_asc">Price (asc)</option>
      <option value="first_seen_desc">First Seen (desc)</option>
      <option value="first_seen_asc">First Seen (asc)</option>
    </select>

    <select id="locationFilter" onchange="applyFilters()" class="border p-2 rounded">
      <option value="">All Sources</option>
    </select>

    <div class="flex items-center gap-2 ml-4">
      <label><input type="radio" name="view" value="list" checked onchange="toggleView('list')"> List</label>
      <label><input type="radio" name="view" value="grid" onchange="toggleView('grid')"> Tiles</label>
    </div>

  </div>

  <div id="status" class="mb-3 text-sm text-gray-600"></div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <div class="lg:col-span-2">
      <div id="results"></div>
    </div>

    <div class="hidden lg:block">
      <div class="sticky top-4">
        <div id="map" class="w-full h-[600px] rounded-xl shadow"></div>
      </div>
    </div>
  </div>
</div>

<script>
let properties = [];
let filtered = [];
let map;
let markers = [];
let selectedId = null;
let viewMode = 'list';
let mapMessageControl = null;

const DATA_URL = "https://raw.githubusercontent.com/samjraywood/property-result-data/main/property-results.json";

function formatPrice(v){ return v ? "£"+Number(v).toLocaleString() : "?" }

function formatDateTime(v){
  if(!v) return "-";
  const d = new Date(v);
  return d.toLocaleString(undefined, {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function isNew(v){
  if(!v) return false;
  const now = new Date();
  const d = new Date(v);
  return (now - d) <= (12 * 60 * 60 * 1000);
}

function isTopScore(score){
  return (score || 0) >= 8;
}

function setStatus(){
  document.getElementById("status").textContent = `Showing ${filtered.length} of ${properties.length} properties`;
}

function initMap(){
  map=L.map('map').setView([51.5,-0.1],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
}

function updateMap(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const bounds=[];

  filtered.forEach(p=>{
    const lat = Number(p.latitude);
    const lng = Number(p.longitude);
    if(!lat || !lng) return;

    const m = L.marker([lat, lng]).addTo(map);

    if (p.link === selectedId) {
      m.setIcon(L.icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
        iconSize: [32, 32]
      }));
    }

    markers.push(m);
    bounds.push([lat,lng]);
  });

  if(bounds.length && !selectedId){
    map.fitBounds(bounds,{padding:[40,40]});
  }
}

async function loadData(){
  const res = await fetch(DATA_URL);
  const data = await res.json();

  properties = Object.values(data || {});
  filtered = [...properties];

  populateLocations();
  applyFilters();
}

function populateLocations(){
  const s=document.getElementById("locationFilter");
  s.innerHTML='<option value="">All Sources</option>';

  [...new Set(properties.map(p=>p.source_location).filter(Boolean))]
    .forEach(l=>{
      const o=document.createElement("option");
      o.value=l;o.textContent=l;s.appendChild(o);
    });
}

function toggleView(mode){
  viewMode = mode;
  render();
}

function render(){
  const c=document.getElementById("results");

  c.className = viewMode === 'grid'
    ? "grid grid-cols-1 md:grid-cols-2 gap-4"
    : "flex flex-col gap-3";

  c.innerHTML="";

  filtered.forEach(p=>{
    const d=document.createElement("div");
    d.dataset.id = p.link;
    d.className = "bg-white p-3 rounded-xl shadow cursor-pointer relative overflow-hidden";

    if(selectedId===p.link) d.classList.add("selected-tile");

    const ribbons = `
      ${isNew(p.first_seen) ? '<div class="ribbon ribbon-left">NEW</div>' : ''}
      ${isTopScore(p.score) ? '<div class="ribbon ribbon-right">TOP PICK</div>' : ''}
    `;

    const thumb = p.thumbnail || "https://via.placeholder.com/300x200";

    if(viewMode === 'grid'){
      d.innerHTML = `
        ${ribbons}
        <img src="${thumb}" class="w-full h-48 object-cover rounded mb-2"
          onerror="this.src='https://via.placeholder.com/300x200'" />

        <div class="text-sm space-y-1">
          <div><strong>💰 Price:</strong> ${formatPrice(p.price)}</div>
          <div><strong>⭐ Score:</strong> ${p.score||0}</div>
          <div><strong>📍 Location:</strong> ${p.location||'-'}</div>
          <div><strong>🛏 Beds:</strong> ${p.beds||'-'}</div>
          <div><strong>🛁 Baths:</strong> ${p.baths||'-'}</div>
          <div><strong>📐 Size:</strong> ${p.property_size||'-'}</div>
          <div><strong>🌳 Garden:</strong> ${p.garden_size || p.garden || '-'}</div>
          <div><strong>🧠 Matches:</strong> ${(p.matches||[]).join(', ')}</div>
          <div><strong>📡 Source:</strong> ${p.source_location||'-'}</div>
          <div><strong>🕒 First Seen:</strong> ${formatDateTime(p.first_seen)}</div>
        </div>

        <button onclick="window.open('${p.link}','_blank');event.stopPropagation();"
          class="mt-3 bg-blue-500 text-white px-3 py-2 rounded w-full">
          View
        </button>
      `;
    } else {
      d.innerHTML = `
        ${ribbons}
        <div class="grid grid-cols-[120px_1fr_1fr_auto] gap-3 items-center">

          <img src="${thumb}" class="w-full h-24 object-cover rounded"
            onerror="this.src='https://via.placeholder.com/150'" />

          <div class="text-xs space-y-1">
            <div><strong>💰 Price:</strong> ${formatPrice(p.price)}</div>
            <div><strong>📍 Location:</strong> ${p.location||'-'}</div>
            <div><strong>🛏 Beds:</strong> ${p.beds||'-'}</div>
            <div><strong>📐 Size:</strong> ${p.property_size||'-'}</div>
            <div><strong>🧠 Matches:</strong> ${(p.matches||[]).join(', ')}</div>
            <div><strong>📡 Source:</strong> ${p.source_location||'-'}</div>
          </div>

          <div class="text-xs space-y-1">
            <div><strong>⭐ Score:</strong> ${p.score||0}</div>
            <div>&nbsp;</div>
            <div><strong>🛁: Baths</strong> ${p.baths||'-'}</div>
            <div><strong>🌳 Garden:</strong> ${p.garden_size || p.garden || '-'}</div>
            <div>&nbsp;</div>
            <div><strong>🕒 First Seen:</strong> ${formatDateTime(p.first_seen)}</div>
          </div>

          <div class="flex items-center justify-center h-full">
            <button onclick="window.open('${p.link}','_blank');event.stopPropagation();"
              class="bg-blue-500 text-white px-3 py-1 rounded text-sm">
              View
            </button>
          </div>

        </div>
      `;
    }

    c.appendChild(d);
  });
}

function applyFilters(){
  const sort=document.getElementById("sortBy").value;
  const loc=document.getElementById("locationFilter").value;

  filtered = properties.filter(p=>
    (!loc || p.source_location===loc)
  );

  filtered.sort((a,b)=>{
    switch(sort){
      case 'score_desc': return (b.score||0)-(a.score||0);
      case 'score_asc': return (a.score||0)-(b.score||0);
      case 'price_desc': return (b.price||0)-(a.price||0);
      case 'price_asc': return (a.price||0)-(b.price||0);
      case 'first_seen_desc': return new Date(b.first_seen)-new Date(a.first_seen);
      case 'first_seen_asc': return new Date(a.first_seen)-new Date(b.first_seen);
      default: return 0;
    }
  });

  selectedId=null;

  render();
  updateMap();
  setStatus();
}

initMap();
loadData();
</script>

</body>
</html>
