<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/samjraywood/property-results-dashboard/main/house_image.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    .selected-tile { outline: 2px solid #6b8e23; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="bg-gradient-to-br from-stone-100 via-stone-200 to-lime-100 p-4">

<div class="max-w-7xl mx-auto">
  <h1 class="flex items-center gap-3 text-2xl font-semibold mb-4 text-slate-800">
    <img src="https://raw.githubusercontent.com/samjraywood/property-results-dashboard/main/house_image.png" class="w-10 h-10 opacity-80" />
    Property Dashboard
  </h1>

  <div class="bg-lime-700 text-white p-3 rounded-xl shadow-lg mb-4 flex flex-wrap gap-2 items-center">

    <select id="sortBy" onchange="applyFilters()" class="bg-white/90 text-gray-800 border-none p-2 rounded shadow-sm">
      <option value="score_desc" selected>Score (desc)</option>
      <option value="score_asc">Score (asc)</option>
      <option value="price_desc">Price (desc)</option>
      <option value="price_asc">Price (asc)</option>
      <option value="first_seen_desc">First Seen (desc)</option>
      <option value="first_seen_asc">First Seen (asc)</option>
    </select>

    <select id="locationFilter" onchange="applyFilters()" class="bg-white/90 text-gray-800 border-none p-2 rounded shadow-sm">
      <option value="">All Sources</option>
    </select>

    <div class="flex items-center gap-2 ml-4">
      <label><input type="radio" name="view" value="list" onchange="toggleView('list')"> List</label>
      <label><input type="radio" name="view" value="grid" checked onchange="toggleView('grid')"> Tiles</label>
    </div>

  </div>

  <div id="status" class="mb-3 text-sm text-gray-600"></div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <div class="lg:col-span-2">
      <div id="results"></div>
    </div>

    <div class="hidden lg:block">
      <div class="sticky top-4">
        <div id="map" class="w-full h-[600px] rounded-xl shadow"></div>
      </div>
    </div>
  </div>
</div>

<script>
let properties = [];
let filtered = [];
let map;
let markers = [];
let selectedId = null;
let viewMode = 'grid';
let mapMessageControl = null;

const DATA_URL = "https://raw.githubusercontent.com/samjraywood/property-result-data/main/property-results.json";

function formatPrice(v){ return v ? "£"+Number(v).toLocaleString() : "?" }

function formatDateTime(v){
  if(!v) return "-";
  const d = new Date(v);
  return d.toLocaleString(undefined, {
    year:'numeric',
    month:'short',
    day:'numeric',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function isNew(v){
  if(!v) return false;
  return (new Date() - new Date(v)) <= (12*60*60*1000);
}

function isTopScore(score){
  return (score||0) >= 50;
}

function getScorePercent(p){
  const val = Number(p?.score_percent);
  if (Number.isFinite(val)) return Math.max(0, Math.min(100, Math.round(val)));

  const fallback = Number(p?.score);
  if (Number.isFinite(fallback)) return Math.max(0, Math.min(100, Math.round(fallback)));

  return 0;
}

function normalizeBreakdownEntry(entry){
  if (Array.isArray(entry)) {
    return {
      feature: String(entry[0] ?? "").trim(),
      score: Number(entry[1] ?? 0)
    };
  }

  if (entry && typeof entry === "object") {
    const feature = String(
      entry.feature ?? entry.name ?? entry.label ?? entry.signal ?? ""
    ).trim();
    const score = Number(entry.score ?? entry.value ?? entry.points ?? 0);
    return { feature, score };
  }

  if (typeof entry === "string") {
    const text = entry.trim();
    const m = text.match(/([+-]?\d+(?:\.\d+)?)\s*$/);
    const score = m ? Number(m[1]) : 0;
    const feature = m ? text.slice(0, m.index).replace(/[:\-–]\s*$/, "").trim() : text;
    return { feature, score };
  }

  return { feature: "", score: 0 };
}

function renderScoreBreakdown(breakdown){
  const entries = (Array.isArray(breakdown) ? breakdown : [])
    .map(normalizeBreakdownEntry)
    .filter(item => item.feature);

  if (!entries.length) {
    return '<div class="text-gray-500">-</div>';
  }

  return entries.map(item => {
    const positive = item.score >= 0;
    const colorClass = positive ? "text-green-700" : "text-red-700";
    const arrow = positive ? "&uarr;" : "&darr;";
    const value = `${positive ? "+" : ""}${item.score}`;

    return `
      <div class="flex items-center justify-between gap-2 ${colorClass}">
        <span class="truncate">${item.feature} (${value})</span>
        <span class="text-xs font-semibold">${arrow}</span>
      </div>
    `;
  }).join("");
}

function setStatus(){
  document.getElementById("status").textContent = `Showing ${filtered.length} of ${properties.length} properties`;
}

function initMap(){
  map=L.map('map').setView([51.5,-0.1],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
}

function showMapMessage(msg){
  clearMapMessage();

  mapMessageControl = L.control({ position: 'topright' });

  mapMessageControl.onAdd = function () {
    const div = L.DomUtil.create('div');
    div.className = "bg-yellow-100 border border-yellow-300 text-yellow-800 px-3 py-2 rounded shadow text-sm";
    div.innerHTML = msg;
    return div;
  };

  mapMessageControl.addTo(map);
}

function clearMapMessage(){
  if (mapMessageControl){
    map.removeControl(mapMessageControl);
    mapMessageControl = null;
  }
}

function updateMap(){
  clearMapMessage();

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const bounds=[];

  filtered.forEach(p=>{
    const lat = Number(p.latitude);
    const lng = Number(p.longitude);
    if(!lat || !lng) return;

    const m = L.marker([lat, lng]).addTo(map);

    if (p.link === selectedId) {
      m.setIcon(L.icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
        iconSize: [32, 32]
      }));
    }

    m.on("click", () => {
      selectedId = p.link;
      render();

      setTimeout(() => {
        const el = document.querySelector(`[data-id="${p.link}"]`);
        if (el) {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }, 50);

      map.setView([lat, lng], 15);
    });

    markers.push(m);
    bounds.push([lat,lng]);
  });

  if(bounds.length && !selectedId){
    map.fitBounds(bounds,{padding:[40,40]});
  }
}

function focusProperty(p){
  const lat = Number(p.latitude);
  const lng = Number(p.longitude);
  if(lat && lng) map.setView([lat,lng],15);
}

async function loadData(){
  const res = await fetch(DATA_URL);
  const data = await res.json();

  properties = Object.values(data || {});
  filtered = [...properties];

  populateLocations();
  applyFilters();
}

function populateLocations(){
  const s=document.getElementById("locationFilter");
  s.innerHTML='<option value="">All Sources</option>';

  [...new Set(properties.map(p=>p.source_location).filter(Boolean))]
    .forEach(l=>{
      const o=document.createElement("option");
      o.value=l;o.textContent=l;s.appendChild(o);
    });
}

function toggleView(mode){
  viewMode = mode;
  render();
}

function render(){
  const c=document.getElementById("results");

  c.className = viewMode === 'grid'
    ? "grid grid-cols-1 md:grid-cols-2 gap-4"
    : "flex flex-col gap-3";

  c.innerHTML="";

  filtered.forEach(p=>{
    const d=document.createElement("div");
    d.dataset.id = p.link;
    d.className = "bg-white p-3 rounded-xl shadow cursor-pointer relative";

    if(selectedId===p.link) d.classList.add("selected-tile");

    d.onclick = () => {
      const lat = Number(p.latitude);
      const lng = Number(p.longitude);

      if (selectedId === p.link) {
        selectedId = null;
        updateMap();
        render();
        return;
      }

      selectedId = p.link;
      render();

      if (lat && lng) {
        clearMapMessage();
        focusProperty(p);
      } else {
        showMapMessage("No map location available for this property");
      }
    };

    const thumb = p.thumbnail || "https://via.placeholder.com/300x200";
    const scorePercent = getScorePercent(p);
    const scoreBreakdown = renderScoreBreakdown(p.score_breakdown);

    if(viewMode === 'grid'){
      d.innerHTML = `
        <div class="relative">
          ${isNew(p.first_seen) ? '<div class="absolute top-2 left-2 bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded">New</div>' : ''}
          ${isTopScore(scorePercent) ? '<div class="absolute top-2 right-2 bg-yellow-100 text-yellow-800 text-xs px-2 py-0.5 rounded">Top Pick</div>' : ''}

          <img src="${thumb}" class="w-full h-48 object-cover rounded mb-2"
            onerror="this.src='https://via.placeholder.com/300x200'" />

          ${metricCircle(scorePercent, "Score", "left")}
          ${metricCircle(p.extraction_completeness, "Completion", "right")}
        </div>

        <div class="text-sm space-y-1">
          <div><strong>💰 Price:</strong> ${formatPrice(p.price)}</div>
          <div><strong>📍 Location:</strong> ${p.location||'-'}</div>
          <div><strong>🛏 Beds:</strong> ${p.beds||'-'}</div>
          <div><strong>🛁 Baths:</strong> ${p.baths||'-'}</div>
          <div><strong>📐 Size:</strong> ${p.property_size||'-'}</div>
          <div><strong>🌳 Garden:</strong> ${p.garden_size || p.garden || '-'}</div>
          <div class="relative group/tooltip" onclick="event.stopPropagation();">
            <button type="button" class="text-left text-sm text-slate-800 underline decoration-dotted underline-offset-2 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-lime-500 rounded px-1 -ml-1">
              <strong>🧠 Score Breakdown</strong>
            </button>
            <div class="pointer-events-none absolute left-0 top-full mt-1 z-20 w-72 max-w-[90vw] opacity-0 group-hover/tooltip:opacity-100 group-focus-within/tooltip:opacity-100 transition-opacity duration-150">
              <div class="bg-white border border-slate-200 rounded-lg shadow-xl p-2 text-xs space-y-1 max-h-36 overflow-y-auto pointer-events-auto">
                ${scoreBreakdown}
              </div>
            </div>
          </div>
          <div><strong>📡 Source:</strong> ${p.source_location||'-'}</div>
          <div><strong>🕒 First Seen:</strong> ${formatDateTime(p.first_seen)}</div>
        </div>

        <button onclick="window.open('${p.link}','_blank');event.stopPropagation();"
          class="mt-3 bg-blue-500 text-white px-3 py-2 rounded w-full">
          View
        </button>
      `;
    } else {
      d.innerHTML = `
        <div class="absolute top-2 right-2 flex gap-1">
          ${isTopScore(scorePercent) ? '<div class="bg-yellow-100 text-yellow-800 text-xs px-2 py-0.5 rounded">Top Pick</div>' : ''}
          ${isNew(p.first_seen) ? '<div class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded">New</div>' : ''}
        </div>

        <div class="grid grid-cols-[140px_1fr_auto] gap-3 items-start">

          <div>
            <img src="${thumb}" class="w-full h-24 object-cover rounded"
              onerror="this.src='https://via.placeholder.com/150'" />

            <div class="mt-2 flex items-start justify-between gap-2">
              ${metricCircleInline(scorePercent, "Score")}
              ${metricCircleInline(p.extraction_completeness, "Completion")}
            </div>
          </div>

          <div class="text-xs space-y-1 pt-1">
            <div><strong>💰 Price:</strong> ${formatPrice(p.price)}</div>
            <div><strong>📍 Location:</strong> ${p.location||'-'}</div>
            <div><strong>🛏 Beds:</strong> ${p.beds||'-'}</div>
            <div><strong>🛁 Baths:</strong> ${p.baths||'-'}</div>
            <div><strong>📐 Size:</strong> ${p.property_size||'-'}</div>
            <div><strong>🌳 Garden:</strong> ${p.garden_size || p.garden || '-'}</div>
            <div class="relative group/tooltip" onclick="event.stopPropagation();">
              <button type="button" class="text-left text-xs text-slate-800 underline decoration-dotted underline-offset-2 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-lime-500 rounded px-1 -ml-1">
                <strong>🧠 Score Breakdown</strong>
              </button>
              <div class="pointer-events-none absolute left-0 top-full mt-1 z-20 w-72 max-w-[90vw] opacity-0 group-hover/tooltip:opacity-100 group-focus-within/tooltip:opacity-100 transition-opacity duration-150">
                <div class="bg-white border border-slate-200 rounded-lg shadow-xl p-2 text-xs space-y-1 max-h-36 overflow-y-auto pointer-events-auto">
                  ${scoreBreakdown}
                </div>
              </div>
            </div>
            <div><strong>📡 Source:</strong> ${p.source_location||'-'}</div>
            <div><strong>🕒 First Seen:</strong> ${formatDateTime(p.first_seen)}</div>
          </div>

          <div class="flex items-center justify-center h-full">
            <button onclick="window.open('${p.link}','_blank');event.stopPropagation();"
              class="bg-blue-500 text-white px-3 py-1 rounded text-sm">
              View
            </button>
          </div>

        </div>
      `;
    }

    c.appendChild(d);
  });

  updateMap();
}

function completenessCircle(v){
  return metricCircle(v, "Completion", "right");
}

function metricCircle(v, label, side){
  const val = Math.max(0, Math.min(100, Math.round(Number(v) || 0)));

  let color = "#ef4444"; // red
  if(val >= 80) color = "#22c55e"; // green
  else if(val >= 50) color = "#f59e0b"; // yellow

  const radius = 16;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (val / 100) * circumference;
  const sideClass = side === "left" ? "left-2" : "right-2";

  return `
    <div class="absolute bottom-2 ${sideClass}">
      <div class="relative bg-white/85 backdrop-blur rounded-full p-1 shadow"
           title="${label}">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <!-- background circle -->
        <circle
          cx="20" cy="20" r="${radius}"
          stroke="#e5e7eb"
          stroke-width="4"
          fill="none"
        />

        <!-- progress -->
        <circle
          cx="20" cy="20" r="${radius}"
          stroke="${color}"
          stroke-width="4"
          fill="none"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${offset}"
          stroke-linecap="round"
          transform="rotate(-90 20 20)"
        />

        <!-- text -->
        <text
          x="50%" y="50%"
          dominant-baseline="middle"
          text-anchor="middle"
          font-size="10"
          font-weight="700"
          fill="#111827"
        >
          ${val}%
        </text>
      </svg>

      <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-white text-gray-700 text-[9px] px-1.5 py-0.5 rounded-full border border-gray-200 leading-none">
        ${label}
      </div>
      </div>
    </div>
  `;
}

function metricCircleInline(v, label){
  const val = Math.max(0, Math.min(100, Math.round(Number(v) || 0)));

  let color = "#ef4444"; // red
  if(val >= 80) color = "#22c55e"; // green
  else if(val >= 50) color = "#f59e0b"; // yellow

  const radius = 14;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (val / 100) * circumference;

  return `
    <div class="flex flex-col items-center">
      <div class="bg-white/85 backdrop-blur rounded-full p-1 shadow" title="${label}">
        <svg width="36" height="36" viewBox="0 0 40 40">
          <circle
            cx="20" cy="20" r="${radius}"
            stroke="#e5e7eb"
            stroke-width="4"
            fill="none"
          />

          <circle
            cx="20" cy="20" r="${radius}"
            stroke="${color}"
            stroke-width="4"
            fill="none"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"
            stroke-linecap="round"
            transform="rotate(-90 20 20)"
          />

          <text
            x="50%" y="50%"
            dominant-baseline="middle"
            text-anchor="middle"
            font-size="9"
            font-weight="700"
            fill="#111827"
          >
            ${val}%
          </text>
        </svg>
      </div>

      <div class="mt-1 bg-white text-gray-700 text-[9px] px-1.5 py-0.5 rounded-full border border-gray-200 leading-none">
        ${label}
      </div>
    </div>
  `;
}

function applyFilters(){
  const sort=document.getElementById("sortBy").value;
  const loc=document.getElementById("locationFilter").value;

  filtered = properties.filter(p=>
    (!loc || p.source_location===loc)
  );

  filtered.sort((a,b)=>{
    switch(sort){
      case 'score_desc': return getScorePercent(b)-getScorePercent(a);
      case 'score_asc': return getScorePercent(a)-getScorePercent(b);
      case 'price_desc': return (b.price||0)-(a.price||0);
      case 'price_asc': return (a.price||0)-(b.price||0);
      case 'first_seen_desc': return new Date(b.first_seen)-new Date(a.first_seen);
      case 'first_seen_asc': return new Date(a.first_seen)-new Date(b.first_seen);
      default: return 0;
    }
  });

  selectedId=null;

  render();
  updateMap();
  setStatus();
}

initMap();
loadData();
</script>

</body>
</html>
