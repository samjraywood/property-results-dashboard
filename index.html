<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">🏡 Property Dashboard</h1>

    <!-- Filters and Sorting -->
    <div class="bg-white p-4 rounded-2xl shadow mb-6 flex gap-2 flex-wrap">
      <select id="sortBy" onchange="applyFilters()" class="border p-2 rounded">
        <option value="price">Price</option>
        <option value="score">Score</option>
        <option value="first_seen">First Seen</option>
        <option value="beds">Bedrooms</option>
      </select>

      <select id="locationFilter" onchange="applyFilters()" class="border p-2 rounded">
        <option value="">All Locations</option>
      </select>

      <input id="minPrice" type="number" placeholder="Min Price" class="border p-2 rounded" />
      <input id="maxPrice" type="number" placeholder="Max Price" class="border p-2 rounded" />
      <input id="minBeds" type="number" placeholder="Min Beds" class="border p-2 rounded" />
      <button onclick="applyFilters()" class="bg-blue-500 text-white px-4 py-2 rounded">Apply</button>
      <button onclick="resetFilters()" class="bg-gray-300 px-4 py-2 rounded">Reset</button>
    </div>

    <!-- Status / Errors -->
    <div id="status" class="mb-4 text-sm text-gray-600"></div>

    <!-- Results -->
    <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

<script>
let properties = [];
let filtered = [];

// Replace with your public JSON URL
const DATA_URL = "https://raw.githubusercontent.com/samjraywood/property-result-data/main/property-results.json";

function setStatus(msg) {
  const el = document.getElementById("status");
  el.textContent = msg || "";
}

function updateStatusCounts() {
  const total = properties.length;
  const shown = filtered.length;
  if (total === shown) {
    setStatus(`Loaded ${total} properties`);
  } else {
    setStatus(`Showing ${shown} of ${total} properties`);
  }
}

// Load data with error handling
async function loadData() {
  try {
    setStatus("Loading data…");
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    properties = Object.values(data || {});
    filtered = [...properties];

    populateLocationFilter();
    applyFilters();
    setStatus(`Loaded ${properties.length} properties`);
  } catch(e) {
    console.error("Failed to load JSON:", e);
    setStatus("Failed to load data. Check console and DATA_URL.");
  }
}

// Populate source_location dropdown
function populateLocationFilter() {
  const select = document.getElementById("locationFilter");
  // reset options except first
  select.innerHTML = '<option value="">All Locations</option>';
  const locations = [...new Set(properties.map(p => p.source_location).filter(Boolean))];
  locations.sort();
  locations.forEach(loc => {
    const opt = document.createElement("option");
    opt.value = loc;
    opt.textContent = loc;
    select.appendChild(opt);
  });
}

// Format price with commas and £
function formatPrice(value) {
  if (value === null || value === undefined || value === "") return "?";
  const num = Number(value);
  if (!Number.isFinite(num)) return "?";
  return "£" + num.toLocaleString();
}

// Format first seen date safely
function formatDate(dateString) {
  if (!dateString) return "?";
  const d = new Date(dateString);
  if (isNaN(d)) return "?";
  return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
}

// Render property cards
function render() {
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!filtered.length) {
    container.innerHTML = '<div class="col-span-full text-gray-500">No results</div>';
    return;
  }

  filtered.forEach(p => {
    const card = document.createElement("div");
    card.className = "bg-white p-4 rounded-2xl shadow hover:shadow-lg transition cursor-pointer";
    card.onclick = () => { if (p.link) window.open(p.link, "_blank"); };

    // Safe thumbnail fallback
    const thumbUrl = (p.thumbnail && typeof p.thumbnail === 'string' && p.thumbnail.startsWith('http'))
      ? p.thumbnail
      : "https://via.placeholder.com/300x200?text=Property+Image";

    card.innerHTML = `
      <img src="${thumbUrl}" alt="Property" class="w-full h-40 object-cover rounded-lg mb-2" onerror="this.src='https://via.placeholder.com/300x200?text=Property+Image'">
      <div class="text-xl font-semibold mb-1">${formatPrice(p.price)}</div>
      <div class="text-gray-600 mb-1">${p.location || "?"}</div>
      <div class="text-sm mb-1">🛏 ${p.beds ?? "?"} | 🛁 ${p.baths ?? "?"}</div>
      <div class="text-sm mb-1">🌿 ${p.garden || "-"} | 🌾 ${p.land || "-"}</div>
      <div class="text-sm mb-1">⭐ Score: ${p.score ?? 0}</div>
      <div class="text-sm mb-1">First Seen: ${formatDate(p.first_seen)}</div>
      <div class="text-sm mb-1">Source: ${p.source_location || "-"}</div>
    `;

    container.appendChild(card);
  });
}

// Apply sorting & filtering
function applyFilters() {
  const sortBy = document.getElementById("sortBy").value;
  const locationFilter = document.getElementById("locationFilter").value;
  const minPrice = parseInt(document.getElementById("minPrice").value) || 0;
  const maxPrice = parseInt(document.getElementById("maxPrice").value) || Infinity;
  const minBeds = parseInt(document.getElementById("minBeds").value) || 0;

  filtered = properties
    .filter(p =>
      (Number(p.price) || 0) >= minPrice &&
      (Number(p.price) || 0) <= maxPrice &&
      (Number(p.beds) || 0) >= minBeds &&
      (!locationFilter || p.source_location === locationFilter)
    );

  filtered.sort((a, b) => {
    if (sortBy === "price") return (Number(a.price) || 0) - (Number(b.price) || 0);
    if (sortBy === "score") return (Number(b.score) || 0) - (Number(a.score) || 0);
    if (sortBy === "first_seen") return new Date(b.first_seen || 0) - new Date(a.first_seen || 0);
    if (sortBy === "beds") return (Number(b.beds) || 0) - (Number(a.beds) || 0);
    return 0;
  });

  render();
  updateStatusCounts();
}

// Reset filters
function resetFilters() {
  document.getElementById("minPrice").value = "";
  document.getElementById("maxPrice").value = "";
  document.getElementById("minBeds").value = "";
  document.getElementById("locationFilter").value = "";
  filtered = [...properties];
  applyFilters();
}

loadData();
</script>

</body>
</html>
