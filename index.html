<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">🏡 Property Dashboard</h1>

  <div class="bg-white p-4 rounded-2xl shadow mb-6 flex gap-2 flex-wrap">
    <select id="sortBy" onchange="applyFilters()" class="border p-2 rounded">
      <option value="score" selected>Score</option>
      <option value="price">Price</option>
      <option value="first_seen">First Seen</option>
      <option value="beds">Bedrooms</option>
    </select>

    <select id="locationFilter" onchange="applyFilters()" class="border p-2 rounded">
      <option value="">All Locations</option>
    </select>

    <input id="minPrice" type="number" placeholder="Min Price" class="border p-2 rounded" />
    <input id="maxPrice" type="number" placeholder="Max Price" class="border p-2 rounded" />
    <input id="minBeds" type="number" placeholder="Min Beds" class="border p-2 rounded" />

    <button onclick="applyFilters()" class="bg-blue-500 text-white px-4 py-2 rounded">Apply</button>
    <button onclick="resetFilters()" class="bg-gray-300 px-4 py-2 rounded">Reset</button>
  </div>

  <div id="status" class="mb-4 text-sm text-gray-600"></div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <div class="lg:col-span-2">
      <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <div>
      <div id="map" class="w-full h-[650px] rounded-2xl shadow"></div>
    </div>

  </div>
</div>

<script>
let properties = [];
let filtered = [];
let map;
let markers = [];

const DATA_URL = "https://raw.githubusercontent.com/samjraywood/property-result-data/main/property-results.json";

function formatPrice(v){ return v ? "£"+Number(v).toLocaleString() : "?" }

function setStatus(){
  document.getElementById("status").textContent = filtered.length===properties.length
    ? `Loaded ${properties.length} properties`
    : `Showing ${filtered.length} of ${properties.length}`;
}

function initMap(){
  map=L.map('map').setView([51.5,-0.1],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
}

function updateMap(){
  if(!map) return;

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const bounds=[];

  filtered.forEach(p=>{
    const lat = Number(p.latitude || p.lat);
    const lng = Number(p.longitude || p.lng);

    if(!lat || !lng) return;

    const marker = L.marker([lat,lng]).addTo(map)
      .bindPopup(`<b>${formatPrice(p.price)}</b><br>${p.location || ''}`);

    markers.push(marker);
    bounds.push([lat,lng]);
  });

  if(bounds.length){
    map.fitBounds(bounds,{padding:[40,40]});
  }
}

function focusProperty(p){
  const lat = Number(p.latitude || p.lat);
  const lng = Number(p.longitude || p.lng);

  if(!lat || !lng) return;

  map.setView([lat,lng],15);
}

async function loadData(){
  try{
    const res=await fetch(DATA_URL);
    const data=await res.json();

    properties=Object.values(data||{});
    filtered=[...properties];

    populateLocations();
    applyFilters();
  }catch(e){console.error(e)}
}

function populateLocations(){
  const s=document.getElementById("locationFilter");
  s.innerHTML='<option value="">All Locations</option>';

  [...new Set(properties.map(p=>p.source_location).filter(Boolean))]
    .forEach(l=>{
      const o=document.createElement("option");
      o.value=l;o.textContent=l;s.appendChild(o);
    });
}

function render(){
  const c=document.getElementById("results");
  c.innerHTML="";

  filtered.forEach(p=>{
    const d=document.createElement("div");
    d.className="bg-white p-4 rounded-2xl shadow cursor-pointer";

    d.onclick=()=>focusProperty(p);

    const thumb = (p.thumbnail && p.thumbnail.startsWith('http'))
      ? p.thumbnail
      : "https://via.placeholder.com/300x200?text=No+Image";

    const locationText = p.location || "-";

    d.innerHTML=`
      <img src="${thumb}" class="w-full h-40 object-cover rounded mb-2" onerror="this.src='https://via.placeholder.com/300x200'" />
      <div>💰 ${formatPrice(p.price)}</div>
      <div>📍 Source: ${p.source_location||'-'}</div>
      <div>📍 Location: ${locationText}</div>
      <div>🛏 Beds: ${p.beds||'-'}</div>
      <div>🛁 Baths: ${p.baths||'-'}</div>
      <div>⭐ Score: ${p.score||0}</div>
      <div>🧠 Matches: ${(p.matches||[]).join(', ')}</div>
      <button onclick="window.open('${p.link}','_blank');event.stopPropagation();" class="mt-2 bg-blue-500 text-white px-2 py-1 rounded">View</button>
    `;

    c.appendChild(d);
  });
}

function applyFilters(){
  const sort=document.getElementById("sortBy").value;
  const loc=document.getElementById("locationFilter").value;
  const minP=parseInt(minPrice.value)||0;
  const maxP=parseInt(maxPrice.value)||Infinity;
  const minB=parseInt(minBeds.value)||0;

  filtered=properties.filter(p=>
    (p.price||0)>=minP &&
    (p.price||0)<=maxP &&
    (p.beds||0)>=minB &&
    (!loc||p.source_location===loc)
  );

  filtered.sort((a,b)=>{
    if(sort==="price") return (a.price||0)-(b.price||0);
    if(sort==="score") return (b.score||0)-(a.score||0);
    if(sort==="first_seen") return new Date(b.first_seen)-new Date(a.first_seen);
    if(sort==="beds") return (b.beds||0)-(a.beds||0);
  });

  render();
  updateMap();
  setStatus();
}

function resetFilters(){
  minPrice.value="";
  maxPrice.value="";
  minBeds.value="";
  locationFilter.value="";
  filtered=[...properties];
  applyFilters();
}

initMap();
loadData();
</script>

</body>
</html>
