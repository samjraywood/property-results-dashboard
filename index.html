<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    .selected-tile { outline: 3px solid #3b82f6; }
  </style>
</head>
<body class="bg-gray-100 p-4">

<div class="max-w-7xl mx-auto">
  <h1 class="text-2xl md:text-3xl font-bold mb-4">🏡 Property Dashboard</h1>

  <!-- Controls -->
  <div class="bg-white p-3 rounded-xl shadow mb-4 flex flex-wrap gap-2 items-center">
    <select id="sortBy" onchange="applyFilters()" class="border p-2 rounded">
      <option value="score">Score</option>
      <option value="price">Price</option>
      <option value="first_seen">First Seen</option>
      <option value="beds">Bedrooms</option>
    </select>

    <select id="locationFilter" onchange="applyFilters()" class="border p-2 rounded">
      <option value="">All Locations</option>
    </select>

    <input id="minPrice" type="number" placeholder="Min £" class="border p-2 rounded w-24" />
    <input id="maxPrice" type="number" placeholder="Max £" class="border p-2 rounded w-24" />

    <button onclick="applyFilters()" class="bg-blue-500 text-white px-3 py-2 rounded">Apply</button>

    <!-- View toggle -->
    <button onclick="toggleView('grid')" class="px-3 py-2 border rounded">Tiles</button>
    <button onclick="toggleView('list')" class="px-3 py-2 border rounded">List</button>
  </div>

  <div id="status" class="mb-3 text-sm text-gray-600"></div>

  <!-- Layout -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

    <!-- Results -->
    <div class="lg:col-span-2">
      <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- Map -->
    <div class="sticky top-4 lg:block hidden">
      <div id="map" class="w-full h-[600px] rounded-xl shadow relative"></div>
      <div id="mapMessage" class="absolute inset-0 flex items-center justify-center text-gray-600 bg-white/80 hidden">
        No location data available for this property
      </div>
    </div>

  </div>

  <!-- Mobile Map Toggle -->
  <div class="lg:hidden fixed bottom-4 right-4">
    <button onclick="toggleMobileMap()" class="bg-blue-500 text-white px-4 py-2 rounded-full shadow">Map</button>
  </div>

  <div id="mobileMap" class="hidden fixed inset-0 bg-white z-50">
    <div id="mapMobile" class="w-full h-full"></div>
    <button onclick="toggleMobileMap()" class="absolute top-4 right-4 bg-black text-white px-3 py-1 rounded">Close</button>
  </div>

</div>

<script>
let properties = [];
let filtered = [];
let map, mapMobile;
let markers = [];
let selectedId = null;
let viewMode = 'grid';

const DATA_URL = "https://raw.githubusercontent.com/samjraywood/property-result-data/main/property-results.json";

function formatPrice(v){ return v ? "£"+Number(v).toLocaleString() : "?" }

function setStatus(){
  document.getElementById("status").textContent = `Showing ${filtered.length} properties`;
}

function initMap(){
  map=L.map('map').setView([51.5,-0.1],10);
  mapMobile=L.map('mapMobile').setView([51.5,-0.1],10);

  const layer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});
  layer.addTo(map);
  layer.addTo(mapMobile);
}

function updateMap(){
  markers.forEach(m=>{
    map.removeLayer(m);
    mapMobile.removeLayer(m);
  });
  markers=[];

  const bounds=[];

  filtered.forEach(p=>{
    const lat = Number(p.latitude);
    const lng = Number(p.longitude);

    if(!lat || !lng) return;

    const m=L.marker([lat,lng]).addTo(map).addTo(mapMobile);
    markers.push(m);
    bounds.push([lat,lng]);
  });

  if(bounds.length && !selectedId){
    map.fitBounds(bounds);
    mapMobile.fitBounds(bounds);
  }
}

function focusProperty(p){
  const lat = Number(p.latitude);
  const lng = Number(p.longitude);

  if(!lat || !lng){
    document.getElementById("mapMessage").classList.remove("hidden");
    return;
  }

  document.getElementById("mapMessage").classList.add("hidden");
  map.setView([lat,lng],15);
  mapMobile.setView([lat,lng],15);
}

function toggleMobileMap(){
  const el=document.getElementById("mobileMap");
  el.classList.toggle("hidden");
  setTimeout(()=>{
    mapMobile.invalidateSize();
  },200);
}

async function loadData(){
  const res=await fetch(DATA_URL);
  const data=await res.json();

  properties=Object.values(data||{});
  filtered=[...properties];

  populateLocations();
  applyFilters();
}

function populateLocations(){
  const s=document.getElementById("locationFilter");
  [...new Set(properties.map(p=>p.source_location).filter(Boolean))]
    .forEach(l=>{
      const o=document.createElement("option");
      o.value=l;o.textContent=l;s.appendChild(o);
    });
}

function toggleView(mode){
  viewMode = mode;
  render();
}

function render(){
  const c=document.getElementById("results");

  c.className = viewMode === 'grid'
    ? "grid grid-cols-1 md:grid-cols-2 gap-4"
    : "flex flex-col gap-3";

  c.innerHTML="";

  filtered.forEach(p=>{
    const d=document.createElement("div");

    d.className = viewMode === 'grid'
      ? "bg-white p-3 rounded-xl shadow cursor-pointer"
      : "bg-white p-3 rounded-xl shadow cursor-pointer flex gap-3";

    if(selectedId===p.link) d.classList.add("selected-tile");

    d.onclick=()=>{
      if(selectedId===p.link){
        selectedId=null;
        updateMap();
        render();
        return;
      }

      selectedId=p.link;
      render();
      focusProperty(p);
    };

    const thumb = p.thumbnail || "https://via.placeholder.com/150";

    d.innerHTML = viewMode === 'grid'
      ? `
        <img src="${thumb}" class="w-full h-32 object-cover rounded mb-2" />
        <div>${formatPrice(p.price)}</div>
        <div>${p.location||'-'}</div>
      `
      : `
        <img src="${thumb}" class="w-24 h-24 object-cover rounded" />
        <div>
          <div>${formatPrice(p.price)}</div>
          <div>${p.location||'-'}</div>
        </div>
      `;

    c.appendChild(d);
  });
}

function applyFilters(){
  filtered=[...properties];
  selectedId=null;
  render();
  updateMap();
  setStatus();
}

initMap();
loadData();
</script>

</body>
</html>
