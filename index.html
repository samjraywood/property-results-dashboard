<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body class="bg-gray-100 p-6">

  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">🏡 Property Dashboard</h1>

    <!-- Filters and Sorting -->
    <div class="bg-white p-4 rounded-2xl shadow mb-6 flex gap-2 flex-wrap">
      <select id="sortBy" onchange="applyFilters()" class="border p-2 rounded">
        <option value="score" selected>Score</option>
        <option value="price">Price</option>
        <option value="first_seen">First Seen</option>
        <option value="beds">Bedrooms</option>
      </select>

      <select id="locationFilter" onchange="applyFilters()" class="border p-2 rounded">
        <option value="">All Locations</option>
      </select>

      <input id="minPrice" type="number" placeholder="Min Price" class="border p-2 rounded" />
      <input id="maxPrice" type="number" placeholder="Max Price" class="border p-2 rounded" />
      <input id="minBeds" type="number" placeholder="Min Beds" class="border p-2 rounded" />
      <button onclick="applyFilters()" class="bg-blue-500 text-white px-4 py-2 rounded">Apply</button>
      <button onclick="resetFilters()" class="bg-gray-300 px-4 py-2 rounded">Reset</button>
    </div>

    <!-- Status -->
    <div id="status" class="mb-4 text-sm text-gray-600"></div>

    <!-- Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- LEFT: Properties -->
      <div class="lg:col-span-2">
        <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
      </div>

      <!-- RIGHT: Map -->
      <div>
        <div id="map" class="w-full h-[600px] rounded-2xl shadow"></div>
      </div>

    </div>
  </div>

<script>
let properties = [];
let filtered = [];
let map;
let markers = [];

const DATA_URL = "https://raw.githubusercontent.com/samjraywood/property-result-data/main/property-results.json";

function setStatus(msg) {
  document.getElementById("status").textContent = msg || "";
}

function updateStatusCounts() {
  const total = properties.length;
  const shown = filtered.length;
  setStatus(total === shown ? `Loaded ${total} properties` : `Showing ${shown} of ${total} properties`);
}

// Map init
function initMap() {
  map = L.map('map').setView([51.5, -0.1], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
}

// Plot all filtered markers
function updateMapMarkers() {
  if (!map) return;

  // clear old markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const bounds = [];

  filtered.forEach(p => {
    if (!p.lat || !p.lng) return;

    const lat = Number(p.lat);
    const lng = Number(p.lng);

    const marker = L.marker([lat, lng])
      .addTo(map)
      .bindPopup(`<b>${formatPrice(p.price)}</b><br>${p.location || ""}`);

    markers.push(marker);
    bounds.push([lat, lng]);
  });

  // Fit map to markers
  if (bounds.length) {
    map.fitBounds(bounds, { padding: [50, 50] });
  }
}

function focusOnProperty(p) {
  if (!p.lat || !p.lng) return;

  const lat = Number(p.lat);
  const lng = Number(p.lng);

  map.setView([lat, lng], 15);
}

// Format helpers
function formatPrice(value) {
  if (!value) return "?";
  return "£" + Number(value).toLocaleString();
}

function formatDate(dateString) {
  if (!dateString) return "?";
  const d = new Date(dateString);
  return isNaN(d) ? "?" : d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
}

// Load data
async function loadData() {
  try {
    setStatus("Loading data…");
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    const data = await res.json();

    properties = Object.values(data || {});
    filtered = [...properties];

    populateLocationFilter();
    applyFilters();
  } catch(e) {
    console.error(e);
    setStatus("Failed to load data");
  }
}

function populateLocationFilter() {
  const select = document.getElementById("locationFilter");
  select.innerHTML = '<option value="">All Locations</option>';
  const locations = [...new Set(properties.map(p => p.source_location).filter(Boolean))];
  locations.forEach(loc => {
    const opt = document.createElement("option");
    opt.value = loc;
    opt.textContent = loc;
    select.appendChild(opt);
  });
}

// Render cards
function render() {
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!filtered.length) {
    container.innerHTML = '<div class="text-gray-500">No results</div>';
    return;
  }

  filtered.forEach(p => {
    const card = document.createElement("div");
    card.className = "bg-white p-4 rounded-2xl shadow hover:shadow-lg cursor-pointer";

    card.onclick = () => focusOnProperty(p);

    const thumb = p.thumbnail || "https://via.placeholder.com/300x200?text=No+Image";

    card.innerHTML = `
      <img src="${thumb}" class="w-full h-40 object-cover rounded mb-2" />
      <div class="font-semibold text-lg">${formatPrice(p.price)}</div>
      <div class="text-gray-600">${p.location || ""}</div>
      <div class="text-sm">🛏 ${p.beds || "?"} | 🛁 ${p.baths || "?"}</div>
      <div class="text-sm">⭐ ${p.score || 0}</div>
      <div class="text-sm">First Seen: ${formatDate(p.first_seen)}</div>
    `;

    container.appendChild(card);
  });
}

// Filters + sorting
function applyFilters() {
  const sortBy = document.getElementById("sortBy").value;
  const loc = document.getElementById("locationFilter").value;
  const minPrice = parseInt(document.getElementById("minPrice").value) || 0;
  const maxPrice = parseInt(document.getElementById("maxPrice").value) || Infinity;
  const minBeds = parseInt(document.getElementById("minBeds").value) || 0;

  filtered = properties.filter(p =>
    (p.price || 0) >= minPrice &&
    (p.price || 0) <= maxPrice &&
    (p.beds || 0) >= minBeds &&
    (!loc || p.source_location === loc)
  );

  filtered.sort((a, b) => {
    if (sortBy === "price") return (a.price||0)-(b.price||0);
    if (sortBy === "score") return (b.score||0)-(a.score||0);
    if (sortBy === "first_seen") return new Date(b.first_seen)-new Date(a.first_seen);
    if (sortBy === "beds") return (b.beds||0)-(a.beds||0);
  });

  render();
  updateMapMarkers();
  updateStatusCounts();
}

function resetFilters() {
  document.getElementById("minPrice").value = "";
  document.getElementById("maxPrice").value = "";
  document.getElementById("minBeds").value = "";
  document.getElementById("locationFilter").value = "";
  filtered = [...properties];
  applyFilters();
}

initMap();
loadData();
</script>

</body>
</html>
