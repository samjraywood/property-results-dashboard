<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    .selected-tile { outline: 3px solid #3b82f6; }
  </style>
</head>
<body class="bg-gray-100 p-4">

<div class="max-w-7xl mx-auto">
  <h1 class="text-2xl font-bold mb-4">🏡 Property Dashboard</h1>

  <!-- Controls -->
  <div class="bg-white p-3 rounded-xl shadow mb-4 flex flex-wrap gap-2">
    <select id="sortBy" onchange="applyFilters()" class="border p-2 rounded">
      <option value="score">Score</option>
      <option value="price">Price</option>
      <option value="first_seen">First Seen</option>
      <option value="beds">Bedrooms</option>
    </select>

    <select id="locationFilter" onchange="applyFilters()" class="border p-2 rounded">
      <option value="">All Locations</option>
    </select>

    <input id="minPrice" type="number" placeholder="Min £" class="border p-2 rounded w-24" />
    <input id="maxPrice" type="number" placeholder="Max £" class="border p-2 rounded w-24" />
    <input id="minBeds" type="number" placeholder="Beds" class="border p-2 rounded w-20" />

    <button onclick="applyFilters()" class="bg-blue-500 text-white px-3 py-2 rounded">Apply</button>

    <button onclick="toggleView('grid')" class="border px-3 py-2 rounded">Tiles</button>
    <button onclick="toggleView('list')" class="border px-3 py-2 rounded">List</button>
  </div>

  <div id="status" class="mb-3 text-sm text-gray-600"></div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

    <div class="lg:col-span-2">
      <div id="results"></div>
    </div>

    <div class="hidden lg:block sticky top-4">
      <div id="map" class="w-full h-[600px] rounded-xl shadow"></div>
      <div id="mapMessage" class="absolute hidden">No coordinates available</div>
    </div>

  </div>
</div>

<script>
let properties = [];
let filtered = [];
let map;
let markers = [];
let selectedId = null;
let viewMode = 'grid';

const DATA_URL = "https://raw.githubusercontent.com/samjraywood/property-result-data/main/property-results.json";

function formatPrice(v){ return v ? "£"+Number(v).toLocaleString() : "?" }

function setStatus(){
  const el = document.getElementById("status");
  el.textContent = `Showing ${filtered.length} of ${properties.length} properties`;
}

function initMap(){
  map=L.map('map').setView([51.5,-0.1],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
}

function updateMap(){
  if(!map) return;

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const bounds=[];

  filtered.forEach(p=>{
    const lat = Number(p.latitude);
    const lng = Number(p.longitude);

    if(!lat || !lng) return;

    const m = L.marker([lat,lng]).addTo(map);
    markers.push(m);
    bounds.push([lat,lng]);
  });

  if(bounds.length && !selectedId){
    map.fitBounds(bounds,{padding:[40,40]});
  }
}

function focusProperty(p){
  const lat = Number(p.latitude);
  const lng = Number(p.longitude);

  if(!lat || !lng) return;
  map.setView([lat,lng],15);
}

async function loadData(){
  const res = await fetch(DATA_URL);
  const data = await res.json();

  properties = Object.values(data || {});
  filtered = [...properties];

  populateLocations();
  applyFilters();
}

function populateLocations(){
  const s=document.getElementById("locationFilter");
  s.innerHTML='<option value="">All Locations</option>';

  [...new Set(properties.map(p=>p.source_location).filter(Boolean))]
    .forEach(l=>{
      const o=document.createElement("option");
      o.value=l;o.textContent=l;s.appendChild(o);
    });
}

function toggleView(mode){
  viewMode = mode;
  render();
}

function render(){
  const c=document.getElementById("results");

  c.className = viewMode === 'grid'
    ? "grid grid-cols-1 md:grid-cols-2 gap-4"
    : "flex flex-col gap-3";

  c.innerHTML="";

  filtered.forEach(p=>{
    const d=document.createElement("div");

    d.className = viewMode === 'grid'
      ? "bg-white p-3 rounded-xl shadow cursor-pointer"
      : "bg-white p-3 rounded-xl shadow cursor-pointer flex gap-3";

    if(selectedId===p.link) d.classList.add("selected-tile");

    d.onclick=()=>{
      if(selectedId===p.link){
        selectedId=null;
        updateMap();
        render();
        return;
      }

      selectedId=p.link;
      render();
      focusProperty(p);
    };

    const thumb = (p.thumbnail && p.thumbnail.startsWith('http'))
      ? p.thumbnail
      : "https://via.placeholder.com/150";

    const content = `
      <div>💰 ${formatPrice(p.price)}</div>
      <div>📍 ${p.location||'-'}</div>
      <div>🛏 ${p.beds||'-'} | 🛁 ${p.baths||'-'}</div>
      <div>⭐ ${p.score||0}</div>
      <div>🧠 ${(p.matches||[]).join(', ')}</div>
    `;

    d.innerHTML = viewMode === 'grid'
      ? `
        <img src="${thumb}" class="w-full h-32 object-cover rounded mb-2" />
        ${content}
      `
      : `
        <img src="${thumb}" class="w-24 h-24 object-cover rounded" />
        <div>${content}</div>
      `;

    c.appendChild(d);
  });
}

function applyFilters(){
  const loc=document.getElementById("locationFilter").value;
  const minP=parseInt(minPrice.value)||0;
  const maxP=parseInt(maxPrice.value)||Infinity;
  const minB=parseInt(minBeds.value)||0;

  filtered = properties.filter(p=>
    (p.price||0)>=minP &&
    (p.price||0)<=maxP &&
    (p.beds||0)>=minB &&
    (!loc || p.source_location===loc)
  );

  selectedId=null;

  render();
  updateMap();
  setStatus();
}

initMap();
loadData();
</script>

</body>
</html>
